services:
  voice-analyzer:
    container_name: voice-analyzer-api
    build:
      context: .
      dockerfile: ./Dockerfile.arm64
    ports:
      - "5001:5001"
    volumes:
      - ./app:/app
      - ./sample:/sample
      - ./models:/root/.cache/huggingface
      - ./logs:/logs
    depends_on:
      - local-llm
    environment:
      - TZ=Asia/Tokyo
      - LOG_LEVEL=INFO
      - ENV=production
      - LOG_BACKUP_COUNT=14
      - LOG_DIR=/logs
      # Whisper設定（ラズパイ向け最適化）
      - WHISPER_MODEL_SIZE=base
      - WHISPER_BEAM_SIZE=1
      - WHISPER_BEST_OF=1
      # CPUスレッド数（Pi 4/5の4コアに合わせる）
      - WHISPER_CPU_THREADS=4
      # 要約機能（Geminiを使う場合はAPIキーを設定）
      # - GEMINI_API_KEY=your_api_key_here
      # - SUMMARY_PROVIDER=gemini
    restart: unless-stopped
    networks:
      - pi_network

  local-llm:
    image: ollama/ollama
    container_name: local-llm
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pi_network
    ports:
      - "11434:11434"
    restart: unless-stopped

networks:
  pi_network:
    driver: bridge

volumes:
  ollama_data:
